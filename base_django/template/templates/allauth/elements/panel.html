{% load allauth %}
<section {% if attrs.id %}id="{{ attrs.id }}"{% endif %}
        {% if attrs.class %}class="{{ attrs.class }}"{% endif %}>
    <h2>
        {% slot title %}
        {% endslot %}
    </h2>
    <div>
        {% slot body %}
        {% endslot %}
        {% if slots.actions %}
            <ul>
                {% for action in slots.actions %}<li>{{ action }}</li>{% endfor %}
            </ul>
        {% endif %}
    </div>
</section>
